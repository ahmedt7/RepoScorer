openapi: 3.0.3

info:
  title: Repository Scorer API
  version: "1.0.0"
  description: Search GitHub repositories and return a calculated popularity score.

paths:
  /repositories:
    get:
      operationId: searchRepositories
      summary: Search repositories with popularity scores
      tags:
        - Repository Scoring

      parameters:
        - name: createdAfter
          in: query
          required: true
          description: Earliest repository creation date (inclusive).
          schema:
            type: string
            format: date

        - name: language
          in: query
          required: true
          description: Repository programming language.
          schema:
            type: string

        - name: perPage
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30

        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1

      responses:
        "200":
          description: Matching repositories with popularity scores.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoredRepositoriesResponse"

components:
  schemas:

    ScoredRepositoriesResponse:
      type: object
      required:
        - totalCount
        - repositories
      properties:
        totalCount:
          type: integer
          format: int64

        repositories:
          type: array
          items:
            $ref: "#/components/schemas/ScoredRepository"

    ScoredRepository:
      type: object
      required:
        - id
        - name
        - fullName
        - htmlUrl
        - createdAt
        - language
        - stars
        - forks
        - popularityScore
      properties:
        id:
          type: integer
          format: int64

        name:
          type: string

        fullName:
          type: string

        description:
          type: string
          nullable: true

        htmlUrl:
          type: string
          format: uri

        createdAt:
          type: string
          format: date-time

        updatedAt:
          type: string
          format: date-time

        language:
          type: string
          nullable: true

        stars:
          type: integer

        forks:
          type: integer

        watchers:
          type: integer

        openIssues:
          type: integer

        popularityScore:
          type: number
          format: double
          description: >
            Score calculated by this service based on repository metrics
            (for example stars, forks, watchers, recency, etc.).

        owner:
          $ref: "#/components/schemas/Owner"

    Owner:
      type: object
      required:
        - login
        - htmlUrl
      properties:
        login:
          type: string

        htmlUrl:
          type: string
          format: uri

        avatarUrl:
          type: string
          format: uri